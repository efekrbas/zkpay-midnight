name: Smart Contract CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'smart-contracts/**'
      - 'test/**'
      - 'scripts/**'
      - '.github/workflows/smart-contract-ci.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'smart-contracts/**'
      - 'test/**'
      - 'scripts/**'
      - '.github/workflows/smart-contract-ci.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Run Tests
        run: npm test
